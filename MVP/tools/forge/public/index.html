<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SHT Forge</title>
<style>
  :root{ --bg:#12100d; --panel:#1c1813; --panel2:#221d16; --line:#2e2820; --gold:#f5b21a;
    --cyan:#38bdf8; --red:#e0603a; --green:#7fd17f; --bone:#e8e0d2; --muted:#8a8172; --dim:#5f5849;
    --mono:ui-monospace,"Cascadia Mono","SF Mono",Menlo,Consolas,monospace; }
  *{box-sizing:border-box}
  body{margin:0;background:radial-gradient(1100px 480px at 50% -10%,#1e1a13,var(--bg) 60%),var(--bg);
    color:var(--bone);font-family:var(--mono);line-height:1.5;font-size:14px}
  .wrap{max-width:1240px;margin:0 auto;padding:20px 18px 60px}
  header{display:flex;align-items:center;gap:14px;flex-wrap:wrap;border-bottom:1px solid var(--line);padding-bottom:14px}
  .logo{font-family:system-ui,sans-serif;font-weight:800;font-size:22px;letter-spacing:-.01em}
  .logo b{color:var(--gold)}
  .tabs{display:flex;gap:6px;flex-wrap:wrap}
  .tab{font-family:var(--mono);font-size:11.5px;letter-spacing:.08em;padding:7px 11px;border-radius:7px;
    border:1px solid var(--line);background:var(--panel);color:var(--muted);cursor:pointer}
  .tab.on{background:var(--gold);border-color:var(--gold);color:#151109;font-weight:700}
  .tab[disabled]{opacity:.38;cursor:not-allowed}
  .spacer{flex:1}
  .chip{font-size:11px;color:var(--muted);border:1px solid var(--line);border-radius:7px;padding:6px 10px;background:var(--panel)}
  .chip b{color:var(--bone)}
  .gen{margin-top:16px;background:linear-gradient(180deg,var(--panel2),var(--panel));border:1px solid var(--line);border-radius:12px;padding:14px}
  .gen textarea{width:100%;background:#0f0d0b;color:var(--bone);border:1px solid var(--line);border-radius:8px;
    padding:10px 12px;font-family:var(--mono);font-size:13.5px;resize:vertical;min-height:64px}
  .genrow{display:flex;gap:10px;align-items:center;margin-top:10px;flex-wrap:wrap}
  select,input[type=text],input[type=number]{background:#0f0d0b;color:var(--bone);border:1px solid var(--line);border-radius:7px;padding:7px 9px;font-family:var(--mono);font-size:13px}
  input[type=number]{width:74px}
  button{font-family:var(--mono);font-size:13px;border-radius:8px;border:1px solid var(--line);background:var(--panel);color:var(--bone);padding:9px 14px;cursor:pointer}
  button:hover{border-color:#443c30}
  button.primary{background:var(--gold);border-color:var(--gold);color:#151109;font-weight:700}
  button.danger{border-color:#5a2a1e;color:#f0a48a}
  button[disabled]{opacity:.5;cursor:wait}
  .hint{font-size:11.5px;color:var(--dim)}
  #status{font-size:12.5px;color:var(--green);min-height:18px;margin-top:8px}
  .card{margin-top:16px;background:linear-gradient(180deg,var(--panel2),var(--panel));border:1px solid var(--line);border-radius:12px;padding:16px;display:none}
  .card.show{display:block}
  .cardgrid{display:grid;grid-template-columns:1.05fr 1fr 1.15fr;gap:18px}
  @media(max-width:980px){.cardgrid{grid-template-columns:1fr}}
  h3{font-family:system-ui,sans-serif;font-size:13px;margin:0 0 8px;color:var(--gold);letter-spacing:.1em;text-transform:uppercase}
  .field{display:flex;align-items:center;gap:8px;margin-bottom:7px}
  .field label{width:78px;font-size:11px;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;flex:0 0 auto}
  .field input[type=text],.field select{flex:1;min-width:0}
  .badge{display:inline-block;font-size:10.5px;font-weight:700;letter-spacing:.1em;padding:3px 8px;border-radius:5px}
  .badge.lsw{background:var(--gold);color:#151109}
  .badge.human{background:#233242;color:var(--cyan)}
  textarea.backstory{width:100%;min-height:84px;background:#0f0d0b;color:var(--muted);border:1px solid var(--line);border-radius:8px;padding:9px;font-family:system-ui,sans-serif;font-size:13px}
  .statrow{display:grid;grid-template-columns:44px 74px 1fr 120px;gap:8px;align-items:center;margin-bottom:6px}
  .statrow .k{font-size:12px;font-weight:700;color:var(--muted)}
  .statbar{height:8px;border-radius:4px;background:#0f0d0b;border:1px solid #262119;overflow:hidden}
  .statbar i{display:block;height:100%}
  .tier{font-size:10.5px;color:var(--dim);text-align:right}
  .derived{margin-top:10px;font-size:12px;color:var(--muted)}
  .derived b{color:var(--bone)}
  .artstrip{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
  .artcell{background:#0f0d0b;border:1px solid #262119;border-radius:8px;padding:6px 2px 3px;text-align:center}
  .artcell img{image-rendering:pixelated;height:74px;width:auto;max-width:100%}
  .artcell figcaption{font-size:9.5px;color:var(--dim);letter-spacing:.08em}
  .powers input{width:100%}
  .tunechips{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
  .tchip{font-size:10.5px;border:1px solid var(--line);border-radius:6px;padding:4px 8px;color:var(--muted);background:#0f0d0b}
  .tchip b{color:var(--gold)}
  .notes{margin-top:8px;font-size:11px;color:#c9a15a}
  .actions{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap;align-items:center}
  .gallery{margin-top:22px}
  .gal{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;margin-top:10px}
  .gitem{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:10px;text-align:center;cursor:pointer;position:relative}
  .gitem:hover{border-color:#443c30}
  .gitem img{image-rendering:pixelated;height:84px}
  .gitem .nm{font-size:12px;font-weight:700;margin-top:5px}
  .gitem .rl{font-size:10px;color:var(--dim);letter-spacing:.08em;text-transform:uppercase}
  .gitem .del{position:absolute;top:6px;right:6px;font-size:10px;padding:2px 6px;border-radius:5px;background:#241511;border:1px solid #5a2a1e;color:#f0a48a}
  .bulkout{margin-top:10px;font-size:12px;color:var(--muted)}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo">SHT <b>FORGE</b></div>
    <nav class="tabs">
      <button class="tab on">CHARACTER</button>
      <button class="tab" disabled>ITEM</button><button class="tab" disabled>POWER</button>
      <button class="tab" disabled>MAP</button><button class="tab" disabled>ENEMY</button>
      <button class="tab" disabled>FX</button><button class="tab" disabled>SOUND</button>
    </nav>
    <div class="spacer"></div>
    <div class="chip" id="healthchip">connecting…</div>
  </header>

  <section class="gen">
    <textarea id="prompt" placeholder="Describe a character… e.g.  a Nigerian LSW who controls lightning, cocky, streetwear over armor — codename &quot;Voltmatic&quot;"></textarea>
    <div class="genrow">
      <select id="provider">
        <option value="">llm: default</option>
        <option value="mock">llm: mock (no keys)</option>
        <option value="ollama">llm: ollama (local)</option>
        <option value="anthropic">llm: anthropic</option>
      </select>
      <button class="primary" id="forge">⚒ FORGE</button>
      <button id="bulktoggle">bulk…</button>
      <span class="hint">mock mode runs with zero keys — stand-in art, contract-true stats</span>
    </div>
    <div id="bulkbox" style="display:none;margin-top:10px">
      <textarea id="bulkprompts" placeholder="one character concept per line…" style="min-height:90px;width:100%;background:#0f0d0b;color:var(--bone);border:1px solid var(--line);border-radius:8px;padding:10px;font-family:var(--mono);font-size:13px"></textarea>
      <div class="genrow"><button class="primary" id="forgebulk">⚒ FORGE ALL</button><span class="bulkout" id="bulkout"></span></div>
    </div>
    <div id="status"></div>
  </section>

  <section class="card" id="card">
    <div class="cardgrid">
      <div>
        <h3>Identity</h3>
        <div class="field"><label>Codename</label><input type="text" id="f-name"></div>
        <div class="field"><label>Real name</label><input type="text" id="f-realName"></div>
        <div class="field"><label>Origin</label><select id="f-origin"></select><span id="f-lsw"></span></div>
        <div class="field"><label>Role</label><select id="f-role"></select></div>
        <div class="field"><label>Faction</label><input type="text" id="f-faction"></div>
        <h3 style="margin-top:14px">Backstory</h3>
        <textarea class="backstory" id="f-backstory"></textarea>
        <div class="notes" id="f-notes"></div>
      </div>
      <div>
        <h3>Stats <span style="color:var(--dim);text-transform:none;letter-spacing:0">(rank scale)</span></h3>
        <div id="stats"></div>
        <div class="derived" id="derived"></div>
        <h3 style="margin-top:14px">Powers</h3>
        <div class="powers"><input type="text" id="f-powers" placeholder="comma-separated (LSW only)"></div>
        <div class="hint" id="powershint" style="margin-top:5px"></div>
      </div>
      <div>
        <h3>Art — 8 true directions</h3>
        <div class="artstrip" id="artstrip"></div>
        <div class="hint" id="artsource" style="margin-top:6px"></div>
        <h3 style="margin-top:14px">Tuning defaults <span style="color:var(--dim);text-transform:none;letter-spacing:0">(refined in the tuner — next phase)</span></h3>
        <div class="tunechips" id="tuning"></div>
      </div>
    </div>
    <div class="actions">
      <button class="primary" id="save">💾 SAVE TO ROSTER</button>
      <button id="reroll">↻ RE-FORGE SAME PROMPT</button>
      <button class="danger" id="discard">✕ DISCARD</button>
      <span class="hint" id="saveinfo"></span>
    </div>
  </section>

  <section class="gallery">
    <h3>Forged roster <span id="galcount" style="color:var(--dim)"></span></h3>
    <div class="gal" id="gal"></div>
  </section>
</div>
<script src="/app.js"></script>
</body>
</html>
